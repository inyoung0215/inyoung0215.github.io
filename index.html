<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Under Construction · Inyoung Hwang</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Ctext x='50%25' y='50%25' dy='.35em' text-anchor='middle' fill='white' font-family='-apple-system,system-ui' font-weight='700' font-size='14'%3EIH%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root { --blue: #2563eb; --ink: #0b1220; --muted: #5b6577; --line: #e6eaf2; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
    color: var(--ink);
    background: #fafbfd;
    display: grid;
    place-items: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 520px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: #fff;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 30px 60px -28px rgba(15,23,42,0.18);
  }
  .mark {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--blue);
    color: #fff;
    margin: 0 auto 20px;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.04em;
    box-shadow: 0 12px 28px -10px rgba(37,99,235,0.5);
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    color: var(--blue);
    background: #eef4ff;
    border: 1px solid #dbe7ff;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }
  p { margin: 0 0 24px; color: var(--muted); line-height: 1.65; font-size: 15px; }
  .links { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all .15s ease;
  }
  a.btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); transform: translateY(-1px); }
  a.btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  a.btn.primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
</style>
</head>
<body>
  <main class="card">
    <div class="mark">IH</div>
    <span class="tag">Under construction</span>
    <h1>포트폴리오를 다듬고 있어요 ✏️</h1>
    <p>곧 더 정리된 모습으로 찾아뵙겠습니다.<br/>그동안 GitHub과 이메일로 연락 주세요.</p>
    <div class="links">
      <a class="btn primary" href="mailto:hinyoung0215@gmail.com">Email</a>
      <a class="btn" href="https://github.com/inyoung0215" target="_blank" rel="noopener">GitHub</a>
      <a class="btn" href="https://velog.io/@nyoung215" target="_blank" rel="noopener">Blog</a>
    </div>
  </main>
</body>
</html>
